name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Test
        run: cd macos && swift test

      - name: Update latest tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git tag -f latest
          git push origin latest --force
