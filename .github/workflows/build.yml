name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Test
        run: cd macos && swift test

      - name: Package
        run: make release-artifacts

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: UsageKit.zip
          path: macos/UsageKit.zip

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: UsageKit.dmg
          path: macos/UsageKit.dmg
